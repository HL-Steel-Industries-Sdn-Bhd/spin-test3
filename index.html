<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>马卡龙Y形 · 四方旋转记录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f9efe2;
      font-family: 'Segoe UI', 'Quicksand', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      margin: 0;
    }

    .container {
      background: #fffbf5;
      border-radius: 3.5rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.05), 0 10px 20px rgba(0, 0, 0, 0.03);
      padding: 2.5rem 2rem;
      max-width: 750px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 215, 150, 0.3);
    }

    h2 {
      color: #b68b6e;
      font-weight: 500;
      letter-spacing: 2px;
      font-size: 1.8rem;
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    h2 span {
      background: #fde4cf;
      padding: 0.2rem 1rem;
      border-radius: 2rem;
      font-size: 1rem;
      color: #9b7b64;
      letter-spacing: 0.5px;
    }

    .card-demo {
      background: #fff6ed;
      border-radius: 2.5rem;
      padding: 2rem 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: inset 0 2px 10px rgba(255, 235, 200, 0.6), 0 15px 25px rgba(210, 150, 100, 0.15);
    }

    canvas {
      display: block;
      width: 180px;
      height: 180px;
      border-radius: 28px;
      background: #fffaf2;
      box-shadow: 0 10px 20px rgba(180, 130, 90, 0.1);
      transition: all 0.2s ease;
    }

    .control-panel {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      background: #ffdbb5;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 3rem;
      font-size: 1.1rem;
      font-weight: 550;
      color: #6b4e3d;
      letter-spacing: 1px;
      cursor: pointer;
      background: #fad4b8;
      box-shadow: 0 6px 0 #e4b48b, 0 10px 18px rgba(205, 140, 80, 0.2);
      transition: all 0.1s ease;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid #ffe2c9;
      text-transform: uppercase;
      font-weight: 600;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #e4b48b, 0 8px 12px rgba(205, 140, 80, 0.25);
      background: #f7c89a;
    }

    .btn.clear-btn {
      background: #ffd2b0;
      box-shadow: 0 6px 0 #d6a77a, 0 10px 18px rgba(180, 110, 60, 0.18);
      color: #5a3f32;
    }

    .history-section {
      width: 100%;
      margin-top: 0.8rem;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      color: #b48b65;
      font-weight: 500;
      padding: 0 0.3rem;
    }

    .history-grid {
      background: #fff5e8;
      border-radius: 2rem;
      padding: 1.5rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-height: 500px;
      overflow-y: auto;
      box-shadow: inset 0 0 0 1px rgba(255, 215, 170, 0.5);
    }

    .history-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
      background: #ffffffd6;
      border-radius: 2rem;
      padding: 0.6rem 1.2rem;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
      transition: all 0.3s ease;
    }

    .history-row.current-row {
      background: #fff3e4;
      box-shadow: 0 4px 15px rgba(210, 150, 80, 0.2);
      border: 2px solid #fad4b8;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 4px 15px rgba(210, 150, 80, 0.2); }
      50% { box-shadow: 0 4px 20px rgba(210, 150, 80, 0.4); }
    }

    .mini-canvas-container {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .mini-canvas {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #fff9f2;
      box-shadow: 0 3px 8px rgba(150, 100, 60, 0.1);
      display: block;
      transition: all 0.3s ease;
      animation: fadeInScale 0.4s ease-out;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .mini-label {
      font-size: 0.7rem;
      color: #c8a383;
      font-weight: 600;
      text-align: center;
      margin-top: 2px;
    }

    .row-label {
      font-size: 0.85rem;
      color: #c8a383;
      font-weight: 700;
      min-width: 3.5rem;
      background: #ffefdd;
      padding: 0.3rem 0.7rem;
      border-radius: 1.2rem;
      text-align: center;
      white-space: nowrap;
    }

    .row-label.current-label {
      background: #fad4b8;
      color: #6b4e3d;
      font-weight: 700;
    }

    .empty-message {
      color: #d9b594;
      font-style: italic;
      padding: 1rem;
      text-align: center;
      width: 100%;
    }

    button:disabled {
      opacity: 0.7;
      transform: translateY(2px);
      box-shadow: 0 3px 0 #d1b095;
      pointer-events: none;
    }

    .status-text {
      font-size: 0.9rem;
      color: #b48b65;
      margin-left: 0.5rem;
      font-weight: 500;
    }

    @media (max-width: 500px) {
      .container {
        padding: 1.8rem 1rem;
      }
      .mini-canvas {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>
      🍬 马卡龙Y形
      <span>旋转卡</span>
    </h2>

    <div class="card-demo">
      <canvas id="mainCanvas" width="200" height="200"></canvas>
    </div>

    <div class="control-panel">
      <button class="btn" id="rotateBtn">
        <span>⟳</span> 随机转4次
      </button>
      <button class="btn clear-btn" id="clearHistoryBtn">
        <span>🗑️</span> 清空记录
      </button>
      <span class="status-text" id="statusText"></span>
    </div>

    <div class="history-section">
      <div class="history-header">
        <span>📋 最近10组旋转记录</span>
        <span style="font-size:0.8rem; color:#c7a68b;">(每组5个：原始+4次旋转)</span>
      </div>
      <div class="history-grid" id="historyContainer">
        <div class="empty-message">✨ 点击按钮开始旋转 ✨</div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // ------ 马卡龙色系定义 ------
      const COLOR_YELLOW = "#fceea7"; // 上部黄色
      const COLOR_RED = "#f9b8b2";    // 左红色
      const COLOR_ORANGE = "#fdd0a2"; // 右橙色
      const COLOR_BG = "#fff7ed";     // 背景奶油色

      // 正方形及中心参数
      const SIZE = 140;
      const CENTER_X = 100;
      const CENTER_Y = 100;
      const HALF = SIZE / 2;

      // 获取主画布
      const mainCanvas = document.getElementById('mainCanvas');
      const ctx = mainCanvas.getContext('2d');
      const statusText = document.getElementById('statusText');

      // 历史记录容器
      const historyContainer = document.getElementById('historyContainer');

      // 存储最近10组旋转记录，每组为长度为5的数组 [原始, 第1次, 第2次, 第3次, 第4次]
      let historyRows = [];
      const MAX_ROWS = 10;

      // 当前主画布显示的角度（下一次旋转的起始角度）
      let currentDisplayAngle = 0;

      // 当前正在构建的行（用于逐个添加图形）
      let currentBuildingRow = null;
      let currentBuildingAngles = [];

      // ------ 绘制正方形内的Y形 ------
      function drawYShape(context, angleDeg, canvasSize = 200) {
        const w = canvasSize, h = canvasSize;
        context.clearRect(0, 0, w, h);

        context.fillStyle = COLOR_BG;
        context.fillRect(0, 0, w, h);

        context.save();
        context.translate(CENTER_X, CENTER_Y);

        const rad = (angleDeg * Math.PI) / 180;
        context.rotate(rad);

        // 正方形边框
        context.strokeStyle = "#e7c9a8";
        context.lineWidth = 2.2;
        context.strokeRect(-HALF, -HALF, SIZE, SIZE);

        // Y形三条线
        context.lineWidth = 4.5;
        context.lineCap = 'round';
        context.lineJoin = 'round';

        const topLeft = { x: -HALF, y: -HALF };
        const topRight = { x: HALF, y: -HALF };
        const bottomMid = { x: 0, y: HALF };

        // 左上连线 - 红色
        context.strokeStyle = COLOR_RED;
        context.beginPath();
        context.moveTo(0, 0);
        context.lineTo(topLeft.x, topLeft.y);
        context.stroke();

        // 右上连线 - 橙色
        context.strokeStyle = COLOR_ORANGE;
        context.beginPath();
        context.moveTo(0, 0);
        context.lineTo(topRight.x, topRight.y);
        context.stroke();

        // 向下连线 - 黄色
        context.strokeStyle = COLOR_YELLOW;
        context.beginPath();
        context.moveTo(0, 0);
        context.lineTo(bottomMid.x, bottomMid.y);
        context.stroke();

        // 中心点
        context.fillStyle = "#dbb88c";
        context.beginPath();
        context.arc(0, 0, 4.2, 0, 2 * Math.PI);
        context.fill();

        // 端点
        const drawDot = (x, y, color) => {
          context.fillStyle = color;
          context.beginPath();
          context.arc(x, y, 3.8, 0, 2 * Math.PI);
          context.fill();
        };
        drawDot(topLeft.x, topLeft.y, COLOR_RED);
        drawDot(topRight.x, topRight.y, COLOR_ORANGE);
        drawDot(bottomMid.x, bottomMid.y, COLOR_YELLOW);

        context.restore();
      }

      // 迷你画布绘制
      function drawMiniYShape(context, angleDeg, canvasSize = 56) {
        const miniCenter = canvasSize / 2;
        const miniHalf = canvasSize * 0.32;

        context.clearRect(0, 0, canvasSize, canvasSize);
        context.fillStyle = "#fffaf3";
        context.fillRect(0, 0, canvasSize, canvasSize);

        context.save();
        context.translate(miniCenter, miniCenter);
        const rad = (angleDeg * Math.PI) / 180;
        context.rotate(rad);

        context.strokeStyle = "#e7c9a8";
        context.lineWidth = 1.6;
        context.strokeRect(-miniHalf, -miniHalf, miniHalf * 2, miniHalf * 2);

        context.lineWidth = 3;
        context.lineCap = 'round';

        const topLeft = { x: -miniHalf, y: -miniHalf };
        const topRight = { x: miniHalf, y: -miniHalf };
        const bottomMid = { x: 0, y: miniHalf };

        context.strokeStyle = COLOR_RED;
        context.beginPath();
        context.moveTo(0, 0);
        context.lineTo(topLeft.x, topLeft.y);
        context.stroke();

        context.strokeStyle = COLOR_ORANGE;
        context.beginPath();
        context.moveTo(0, 0);
        context.lineTo(topRight.x, topRight.y);
        context.stroke();

        context.strokeStyle = COLOR_YELLOW;
        context.beginPath();
        context.moveTo(0, 0);
        context.lineTo(bottomMid.x, bottomMid.y);
        context.stroke();

        context.fillStyle = "#dbb88c";
        context.beginPath();
        context.arc(0, 0, 2.2, 0, 2 * Math.PI);
        context.fill();
        context.fillStyle = COLOR_RED;
        context.beginPath(); context.arc(topLeft.x, topLeft.y, 2, 0, 2 * Math.PI); context.fill();
        context.fillStyle = COLOR_ORANGE;
        context.beginPath(); context.arc(topRight.x, topRight.y, 2, 0, 2 * Math.PI); context.fill();
        context.fillStyle = COLOR_YELLOW;
        context.beginPath(); context.arc(bottomMid.x, bottomMid.y, 2, 0, 2 * Math.PI); context.fill();

        context.restore();
      }

      // 初始化主画布
      drawYShape(ctx, currentDisplayAngle);

      // ------ 随机角度 ------
      function getRandomRotationAngle() {
        const angles = [90, 180, 270];
        return angles[Math.floor(Math.random() * angles.length)];
      }

      // 根据角度获取旋转动画时长
      function getRotationDuration(angle) {
        switch(angle) {
          case 90: return 500;  // 0.5秒
          case 180: return 1000; // 1秒
          case 270: return 1500; // 1.5秒
          default: return 500;
        }
      }

      // ------ 创建一个迷你画布元素 ------
      function createMiniCanvas(angle) {
        const miniCanvas = document.createElement('canvas');
        miniCanvas.className = 'mini-canvas';
        miniCanvas.width = 56;
        miniCanvas.height = 56;
        const miniCtx = miniCanvas.getContext('2d');
        drawMiniYShape(miniCtx, angle, 56);
        return miniCanvas;
      }

      // ------ 在历史记录中添加一个图形到当前行 ------
      function addGraphToCurrentRow(angle) {
        if (!currentBuildingRow) {
          // 创建新行
          currentBuildingRow = document.createElement('div');
          currentBuildingRow.className = 'history-row current-row';
          
          const labelSpan = document.createElement('span');
          labelSpan.className = 'row-label current-label';
          labelSpan.textContent = '当前';
          currentBuildingRow.appendChild(labelSpan);
          
          const miniContainer = document.createElement('div');
          miniContainer.className = 'mini-canvas-container';
          currentBuildingRow.appendChild(miniContainer);
          
          // 插入到历史网格的最前面
          if (historyContainer.firstChild) {
            historyContainer.insertBefore(currentBuildingRow, historyContainer.firstChild);
          } else {
            historyContainer.appendChild(currentBuildingRow);
          }
          
          // 移除空消息
          const emptyMsg = historyContainer.querySelector('.empty-message');
          if (emptyMsg) {
            emptyMsg.remove();
          }
        }
        
        // 添加图形到当前行
        const miniContainer = currentBuildingRow.querySelector('.mini-canvas-container');
        const wrapper = document.createElement('div');
        wrapper.style.display = 'flex';
        wrapper.style.flexDirection = 'column';
        wrapper.style.alignItems = 'center';
        
        const miniCanvas = createMiniCanvas(angle);
        wrapper.appendChild(miniCanvas);
        
        const label = document.createElement('span');
        label.className = 'mini-label';
        const currentCount = miniContainer.children.length;
        const labels = ['原', '1', '2', '3', '4'];
        label.textContent = labels[currentCount] || currentCount;
        wrapper.appendChild(label);
        
        miniContainer.appendChild(wrapper);
        
        // 记录角度
        currentBuildingAngles.push(angle);
      }

      // ------ 完成当前行的构建 ------
      function finalizeCurrentRow() {
        if (currentBuildingRow) {
          // 移除current-row样式
          currentBuildingRow.classList.remove('current-row');
          const labelSpan = currentBuildingRow.querySelector('.row-label');
          if (labelSpan) {
            labelSpan.classList.remove('current-label');
          }
          
          // 将当前行添加到historyRows数组
          if (currentBuildingAngles.length === 5) {
            historyRows.unshift([...currentBuildingAngles]);
            if (historyRows.length > MAX_ROWS) {
              historyRows.pop();
              // 移除最后一行的DOM元素
              const rows = historyContainer.querySelectorAll('.history-row');
              if (rows.length > MAX_ROWS) {
                rows[rows.length - 1].remove();
              }
            }
          }
          
          // 重置当前构建行
          currentBuildingRow = null;
          currentBuildingAngles = [];
          
          // 更新所有行的标签
          updateRowLabels();
        }
      }

      // ------ 更新所有行的标签 ------
      function updateRowLabels() {
        const rows = historyContainer.querySelectorAll('.history-row');
        rows.forEach((row, index) => {
          const labelSpan = row.querySelector('.row-label');
          if (labelSpan) {
            if (index === 0 && currentBuildingRow) {
              // 第一行是正在构建的当前行
              labelSpan.textContent = '当前';
              labelSpan.className = 'row-label current-label';
            } else if (index === 0 && !currentBuildingRow) {
              // 第一行是完成的行，但没有正在构建的行
              labelSpan.textContent = '#1';
              labelSpan.className = 'row-label';
            } else {
              labelSpan.textContent = `#${index + 1}`;
              labelSpan.className = 'row-label';
            }
          }
        });
      }

      // ------ 渲染完整的历史记录网格 ------
      function renderHistoryGrid() {
        if (!historyContainer) return;

        historyContainer.innerHTML = '';

        if (historyRows.length === 0 && !currentBuildingRow) {
          historyContainer.innerHTML = '<div class="empty-message">✨ 暂无记录，旋转吧 ✨</div>';
          return;
        }

        // 先渲染正在构建的行（如果有）
        if (currentBuildingRow) {
          historyContainer.appendChild(currentBuildingRow);
        }

        // 渲染已完成的行
        historyRows.forEach((angles, rowIndex) => {
          const rowDiv = document.createElement('div');
          rowDiv.className = 'history-row';
          
          const labelSpan = document.createElement('span');
          labelSpan.className = 'row-label';
          // 如果有正在构建的行，已完成的行从#1开始编号
          const displayNumber = currentBuildingRow ? rowIndex + 1 : rowIndex + 1;
          labelSpan.textContent = `#${displayNumber}`;
          rowDiv.appendChild(labelSpan);

          const miniContainer = document.createElement('div');
          miniContainer.className = 'mini-canvas-container';

          const labels = ['原', '1', '2', '3', '4'];
          angles.forEach((angle, idx) => {
            const wrapper = document.createElement('div');
            wrapper.style.display = 'flex';
            wrapper.style.flexDirection = 'column';
            wrapper.style.alignItems = 'center';

            const miniCanvas = createMiniCanvas(angle);
            wrapper.appendChild(miniCanvas);

            const label = document.createElement('span');
            label.className = 'mini-label';
            label.textContent = labels[idx];
            wrapper.appendChild(label);

            miniContainer.appendChild(wrapper);
          });

          rowDiv.appendChild(miniContainer);
          historyContainer.appendChild(rowDiv);
        });

        // 限制最多显示10行
        const allRows = historyContainer.querySelectorAll('.history-row');
        if (allRows.length > MAX_ROWS) {
          for (let i = MAX_ROWS; i < allRows.length; i++) {
            allRows[i].remove();
          }
        }
      }

      // ------ 清空历史 ------
      function clearAllHistory() {
        historyRows = [];
        currentBuildingRow = null;
        currentBuildingAngles = [];
        renderHistoryGrid();
      }

      // ------ 动画：4次旋转，每次根据角度调整速度，停顿0.5秒 ------
      async function performFourRotations() {
        const pauseDuration = 500; // 停顿时长0.5秒

        // 生成4个随机角度
        const rotations = [
          getRandomRotationAngle(),
          getRandomRotationAngle(),
          getRandomRotationAngle(),
          getRandomRotationAngle()
        ];

        // 记录起始角度（原始角度）
        const startAngle = currentDisplayAngle;

        // 添加原始图形到当前行
        addGraphToCurrentRow(startAngle);
        
        // 当前累积角度
        let accumulatedAngle = startAngle;

        // 执行4次旋转
        for (let i = 0; i < 4; i++) {
          const targetRotation = rotations[i];
          const startRotationAngle = accumulatedAngle;
          const endRotationAngle = (startRotationAngle + targetRotation) % 360;

          // 根据旋转角度确定动画时长
          const rotateDuration = getRotationDuration(targetRotation);
          const framesPerRotation = Math.max(30, Math.floor(rotateDuration / 16)); // 约60fps

          // 更新状态文本
          statusText.textContent = `第${i + 1}次旋转 ${targetRotation}° (${rotateDuration/1000}秒)`;

          // 旋转动画
          await animateSingleRotation(startRotationAngle, endRotationAngle, rotateDuration, framesPerRotation);

          // 更新累积角度
          accumulatedAngle = endRotationAngle;
          currentDisplayAngle = accumulatedAngle;

          // 添加本次旋转结果到当前行
          addGraphToCurrentRow(accumulatedAngle);

          // 如果不是最后一次，停顿0.5秒
          if (i < 3) {
            statusText.textContent = `第${i + 1}次完成，停顿0.5秒...`;
            await pause(pauseDuration);
          }
        }

        // 完成当前行
        finalizeCurrentRow();
        
        statusText.textContent = '✅ 完成！';
        setTimeout(() => {
          statusText.textContent = '';
        }, 2000);
      }

      // 单次旋转动画
      function animateSingleRotation(fromAngle, toAngle, duration, frames) {
        return new Promise((resolve) => {
          const intervalTime = duration / frames;
          let currentFrame = 0;

          // 计算角度差（处理环绕）
          let deltaAngle = toAngle - fromAngle;
          if (deltaAngle > 180) deltaAngle -= 360;
          if (deltaAngle < -180) deltaAngle += 360;

          const timer = setInterval(() => {
            if (currentFrame >= frames) {
              clearInterval(timer);
              // 确保最终角度精确
              drawYShape(ctx, toAngle);
              resolve();
              return;
            }

            // 计算当前角度
            const progress = currentFrame / frames;
            const currentAngle = (fromAngle + deltaAngle * progress + 360) % 360;
            drawYShape(ctx, currentAngle);

            currentFrame++;
          }, intervalTime);
        });
      }

      // 停顿函数
      function pause(duration) {
        return new Promise((resolve) => {
          setTimeout(resolve, duration);
        });
      }

      // ------ 按钮事件 ------
      const rotateBtn = document.getElementById('rotateBtn');
      const clearBtn = document.getElementById('clearHistoryBtn');

      let isAnimating = false;

      rotateBtn.addEventListener('click', async () => {
        if (isAnimating) {
          return;
        }
        isAnimating = true;
        rotateBtn.disabled = true;

        try {
          await performFourRotations();
        } catch (e) {
          console.error('动画出错', e);
        } finally {
          isAnimating = false;
          rotateBtn.disabled = false;
        }
      });

      clearBtn.addEventListener('click', () => {
        if (!isAnimating) {
          clearAllHistory();
        }
      });

      // 初始渲染
      renderHistoryGrid();
    })();
  </script>
</body>
</html>
